<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FineRead</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{width:340px;min-height:200px;background:#080808;color:#f2f2f2;font-family:'Inter',system-ui,sans-serif;font-size:13px;line-height:1.5;}
  .header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.08);}
  .logo{font-size:15px;font-weight:700;letter-spacing:-.3px;}
  .logo span{color:#fff;}
  .status{padding:20px 16px;color:#666;font-size:12.5px;line-height:1.6;}
  .btn{display:block;width:100%;padding:11px 16px;background:#fff;color:#0a0a0a;border:none;border-radius:8px;font-size:13.5px;font-weight:600;cursor:pointer;margin:12px 0 0;font-family:inherit;}
  .btn:hover{opacity:.9;}
  .btn.secondary{background:#212121;color:#b8b8b8;border:1px solid rgba(255,255,255,.1);}
  .btn.secondary:hover{color:#fff;background:#2a2a2a;}
  .content{padding:14px 16px;}
  .key-row{display:flex;flex-direction:column;gap:8px;}
  .key-row input{width:100%;padding:9px 12px;background:#181818;border:1px solid rgba(255,255,255,.1);border-radius:6px;color:#f2f2f2;font-size:12.5px;font-family:inherit;}
  .key-row input:focus{outline:none;border-color:rgba(255,255,255,.3);}
  .key-row label{font-size:11.5px;color:#666;display:flex;align-items:center;gap:6px;cursor:pointer;}
  .result-bar{margin-top:12px;padding:10px 12px;border-radius:6px;font-size:12.5px;font-weight:500;}
  .result-bar.high{background:rgba(248,113,113,.12);color:#f87171;border:1px solid rgba(248,113,113,.25);}
  .result-bar.medium{background:rgba(251,191,36,.10);color:#fbbf24;border:1px solid rgba(251,191,36,.25);}
  .result-bar.low{background:rgba(52,211,153,.10);color:#34d399;border:1px solid rgba(52,211,153,.25);}
  .tag-list{margin-top:8px;display:flex;flex-wrap:wrap;gap:5px;}
  .tag{font-size:10px;padding:2px 8px;border-radius:9999px;background:#212121;color:#909090;border:1px solid rgba(255,255,255,.08);}
  .tag.danger{background:rgba(248,113,113,.1);color:#f87171;border-color:rgba(248,113,113,.2);}
  .tag.warning{background:rgba(251,191,36,.1);color:#fbbf24;border-color:rgba(251,191,36,.2);}
  .open-btn{width:100%;padding:10px;margin-top:10px;background:#151515;border:1px solid rgba(255,255,255,.08);border-radius:8px;color:#909090;font-size:12px;cursor:pointer;font-family:inherit;}
  .open-btn:hover{color:#fff;border-color:rgba(255,255,255,.18);}
  .spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px;}
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="header">
  <div class="logo">Fine<span>Read</span></div>
  <div id="page-title" style="font-size:11px;color:#555;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></div>
</div>
<div class="content">
  <div id="key-section" class="key-row" style="display:none;">
    <div style="font-size:11.5px;color:#666;margin-bottom:2px;">Claude API key (optional — for deep AI analysis)</div>
    <input type="password" id="api-key-input" placeholder="sk-ant-…" autocomplete="off">
    <label><input type="checkbox" id="remember-key-ext"> Remember key</label>
  </div>
  <div id="status-area" class="status">Loading page…</div>
  <div id="result-area"></div>
  <button class="btn" id="scan-btn" onclick="scanPage()" style="display:none;">🔍 Scan this page</button>
  <button class="btn secondary" id="open-app-btn" onclick="openFullApp()" style="margin-top:8px;display:none;">Open full FineRead →</button>
</div>
<script src="popup.js"></script>
</body>
</html>
